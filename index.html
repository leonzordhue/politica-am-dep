<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AKE - Plataforma Política AM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-mono">
    <div class="flex h-screen">
        <aside class="w-1/4 bg-black p-6 border-r border-green-900 overflow-y-auto">
            <div class="mb-8 border-b border-green-500 pb-4">
                <h1 class="text-xl font-bold text-green-400">AKE ENGINE v0.1</h1>
                <p class="text-[10px] text-gray-500">AXIOMATIC KERNEL - AMAZONAS</p>
            </div>

            <label class="block text-xs mb-2">SELECIONAR DEPUTADO</label>
            <select id="select-dep" class="w-full bg-slate-800 p-2 border border-slate-600 rounded mb-6 outline-none focus:border-green-500 text-sm">
                <option value="roberto-cidade">Roberto Cidade</option>
                <option value="alessandra-campelo">Alessandra Campêlo</option>
                <option value="sinesio-campos">Sinésio Campos</option>
            </select>

            <div id="card-perfil" class="bg-slate-800 p-4 rounded border border-slate-700">
                <div class="w-full aspect-square bg-slate-700 rounded mb-4 overflow-hidden border border-green-500">
                    <img id="dep-foto" src="" class="w-full h-full object-cover">
                </div>
                <h2 id="dep-nome" class="text-lg font-bold">---</h2>
                <p id="dep-partido" class="text-xs text-green-500 mb-4">---</p>
                
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between"><span>Assiduidade:</span><span id="dep-presenca" class="text-green-400">0%</span></div>
                    <div class="flex justify-between"><span>Ranking Gastos:</span><span id="dep-gasto" class="text-red-400">R$ 0,00</span></div>
                    <div class="flex justify-between"><span>Leis/Ano:</span><span id="dep-leis" class="text-blue-400">0</span></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col p-6">
            <div class="flex-1 bg-black rounded border border-slate-700 relative overflow-hidden mb-6">
                <div id="map" class="w-full h-full"></div>
                <div class="absolute top-4 right-4 bg-black/80 p-2 border border-green-500 text-[10px] z-[1000]">
                    MODO: RESSONÂNCIA ELEITORAL (GEOJSON CARREGADO)
                </div>
            </div>

            <div class="h-1/3 grid grid-cols-3 gap-4">
                <div class="bg-slate-800 border border-slate-700 p-4 rounded">
                    <h3 class="text-xs text-gray-400 mb-2">CUSTO POR LEI APROVADA</h3>
                    <p class="text-2xl text-green-400 font-bold">R$ 14.200</p>
                    <small class="text-[9px] text-gray-500">Eficiência: Alta</small>
                </div>
                <div class="bg-slate-800 border border-slate-700 p-4 rounded">
                    <h3 class="text-xs text-gray-400 mb-2">TEMAS DE IMPACTO</h3>
                    <div class="flex flex-wrap gap-1 mt-2">
                        <span class="bg-blue-900 px-2 py-1 rounded text-[10px]">SAÚDE</span>
                        <span class="bg-purple-900 px-2 py-1 rounded text-[10px]">PCD</span>
                    </div>
                </div>
                <div class="bg-slate-800 border border-slate-700 p-4 rounded">
                    <h3 class="text-xs text-gray-400 mb-2">RESSONÂNCIA NO INTERIOR</h3>
                    <p class="text-2xl text-yellow-400 font-bold">8.4 / 10</p>
                    <small class="text-[9px] text-gray-500">Base: Calha do Madeira</small>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Inicialização do Mapa AKE
        var map = L.map('map').setView([-3.119, -60.021], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // O sistema deve carregar o seu geojson aqui
        // fetch('ZONAS_ELEITORAIS_AM.geojson').then(r => r.json()).then(data => L.geoJSON(data).addTo(map));

        document.getElementById('select-dep').addEventListener('change', function(e) {
            const dep = e.target.value;
            // Lógica de colapso de dados
            document.getElementById('dep-foto').src = `https://www.aleam.gov.br/wp-content/uploads/fotos/${dep}.jpg`;
            // Aqui conectaremos ao JSON de saída do Apps Script
        });
    </script>
</body>
</html>
