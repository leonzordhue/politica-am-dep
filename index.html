<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKE // Inteligência Eleitoral AM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #a1a1aa; }
        #map { height: 600px; background: #000; filter: grayscale(1) invert(1) contrast(1.2); border: 1px solid #064e3b; }
        .ake-card { background: rgba(10, 10, 10, 0.95); border: 1px solid #14532d; }
        .custom-tooltip { background: #000; border: 1px solid #00ff00; color: #00ff00; font-size: 10px; }
    </style>
</head>
<body>

    <header class="p-4 border-b border-green-900 flex justify-between items-center bg-black">
        <div>
            <h1 class="text-green-500 font-bold text-xl italic tracking-tighter">AKE // ANALYTICS 2022</h1>
            <p class="text-[9px] text-green-800 uppercase">Deploy: GitHub Pages v1.0</p>
        </div>
        <div id="status" class="text-[10px] text-green-500 border border-green-900 px-3 py-1 rounded-full">ESTÁVEL</div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4">
        <aside class="col-span-12 lg:col-span-3 space-y-4">
            <div class="ake-card p-4 rounded-sm">
                <label class="text-[10px] text-green-600 font-bold uppercase block mb-2">Seletor de Eleito</label>
                <select id="dep-select" class="w-full bg-zinc-900 border border-zinc-800 p-3 text-sm text-white focus:border-green-500 outline-none cursor-pointer">
                    <option value="">Aguardando Sincronia...</option>
                </select>
            </div>

            <div id="profile" class="ake-card p-4 rounded-sm hidden">
                <img id="dep-img" src="" class="w-full border border-zinc-800 mb-4 grayscale hover:grayscale-0 transition-all">
                <h2 id="dep-nome" class="text-white font-bold text-lg leading-tight">---</h2>
                <div class="mt-4 p-2 bg-zinc-900/50 border-l-2 border-green-500">
                    <span class="text-[9px] text-zinc-500 block uppercase">Votação Consolidada</span>
                    <span id="stat-votos" class="text-white font-bold">0</span>
                </div>
            </div>
        </aside>

        <section class="col-span-12 lg:col-span-9">
            <div id="map" class="rounded-sm"></div>
        </section>
    </main>

    <script>
        let map, geoLayer, dataVotos;

        // 1. Inicializa Mapa
        map = L.map('map', { zoomControl: false }).setView([-3.46, -62.21], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. Carga de Dados via GitHub (Caminhos Relativos)
        async function bootstrap() {
            try {
                // Carrega GeoJSON
                const geoReq = await fetch('./AM_MUNICIPIOS.geojson');
                const geoJson = await geoReq.json();

                // Carrega CSV Otimizado (1.88MB)
                Papa.parse('./eleitos_local_compacto.csv', {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        dataVotos = results.data;
                        startInterface(geoJson);
                    }
                });
            } catch (e) {
                document.getElementById('status').innerText = "ERRO DE CARGA";
                console.error(e);
            }
        }

        function startInterface(geoJson) {
            // Preenche o Select
            const lista = [...new Set(dataVotos.map(v => v.NM_VOTAVEL))].filter(n => n).sort();
            const select = document.getElementById('dep-select');
            select.innerHTML = '<option value="">ESCOLHA UM DEPUTADO</option>';
            lista.forEach(nome => {
                const opt = document.createElement('option');
                opt.value = nome;
                opt.text = nome;
                select.appendChild(opt);
            });

            // Camada GeoJSON
            geoLayer = L.geoJSON(geoJson, {
                style: { color: '#111', weight: 1, fillOpacity: 0.1, fillColor: '#000' },
                onEachFeature: (f, l) => {
                    l.bindTooltip(f.properties.NM_MUN, { sticky: true, className: 'custom-tooltip' });
                }
            }).addTo(map);
        }

        function filtrar(nome) {
            if (!nome) return;
            const filtrados = dataVotos.filter(v => v.NM_VOTAVEL === nome);
            const total = filtrados.reduce((acc, v) => acc + (parseInt(v.QT_VOTOS) || 0), 0);
            
            // Agrupar por município para o Heatmap
            const munVotos = {};
            filtrados.forEach(v => {
                const m = v.NM_MUNICIPIO;
                munVotos[m] = (munVotos[m] || 0) + (parseInt(v.QT_VOTOS) || 0);
            });

            const max = Math.max(...Object.values(munVotos));

            geoLayer.eachLayer(l => {
                const mName = l.feature.properties.NM_MUN.toUpperCase();
                const vts = munVotos[mName] || 0;
                if (vts > 0) {
                    const ratio = vts / max;
                    l.setStyle({ fillColor: '#00ff00', fillOpacity: ratio * 0.8, color: '#00ff00', weight: 1 });
                } else {
                    l.setStyle({ fillOpacity: 0.05, color: '#222' });
                }
            });

            // Update UI
            document.getElementById('profile').classList.remove('hidden');
            document.getElementById('dep-nome').innerText = nome;
            document.getElementById('stat-votos').innerText = total.toLocaleString();
            
            const slug = nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "-");
            document.getElementById('dep-img').src = `https://www.aleam.gov.br/wp-content/uploads/fotos/${slug}.jpg`;
        }

        document.getElementById('dep-select').addEventListener('change', e => filtrar(e.target.value));
        window.onload = bootstrap;
    </script>
</body>
</html>
